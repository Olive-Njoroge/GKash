openapi: 3.0.0
info:
  title: GKash Money Market Fund API
  version: 3.1.0
  description: |
    ## GKash Money Market Fund API

    ### 🚀 Registration & Login
    - **Register:** Name + Email + PIN → instant JWT token
    - **Login:** Email + PIN → JWT token (7-day expiry)

    ### 💰 Payments (Payhero / M-Pesa)
    - **Deposit:** STK Push sent to your phone — balance updated automatically after M-Pesa confirmation
    - **Withdraw:** Payout sent to your M-Pesa — balance deducted only after confirmation
    - Balance is **never changed immediately** — it updates only when Payhero's webhook fires

    ### 🔔 Webhook Flow
    1. You call `POST /payments/deposit` or `POST /transactions` (type: withdraw)
    2. Payhero sends an STK push or payout to the phone number
    3. User completes payment on their phone
    4. Payhero calls `POST /payments/callback` (or `POST /transactions/webhook`) with the result
    5. Server marks transaction completed/failed and updates balance

    ### 🤖 AI Chatbot
    - Money market fund specialist
    - RAG-enhanced Kenyan financial advice

servers:
  - url: https://gkash.onrender.com/api
    description: Production server
  - url: http://localhost:3000/api
    description: Development server

tags:
  - name: Authentication
    description: Register and login
  - name: Users
    description: User management
  - name: Accounts
    description: Fund accounts and balances
  - name: Payments
    description: Payhero STK Push deposits and withdrawals
  - name: Transactions
    description: Transaction history and manual adjustments
  - name: Chatbot
    description: Money market chatbot
  - name: Financial Advisory
    description: RAG-enhanced Kenyan financial advice

paths:

  # ─────────────────────────────────────────────
  # AUTHENTICATION
  # ─────────────────────────────────────────────

  /auth/register:
    post:
      summary: Register — Name, Email, PIN
      description: |
        One-step registration. Returns a JWT token immediately.
        - Email must be unique
        - PIN must be exactly 4 digits
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_name, email, user_pin]
              properties:
                user_name:
                  type: string
                  example: John Doe
                email:
                  type: string
                  format: email
                  example: john@example.com
                user_pin:
                  type: string
                  pattern: '^[0-9]{4}$'
                  example: "1234"
      responses:
        "201":
          description: Registration successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        "400":
          description: Missing fields, invalid PIN, or email already registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missing_fields:
                  value: { success: false, message: "Name, email, and PIN are required" }
                invalid_pin:
                  value: { success: false, message: "PIN must be exactly 4 digits" }
                email_exists:
                  value: { success: false, message: "Email already registered" }
        "500":
          $ref: '#/components/responses/ServerError'

  /auth/login:
    post:
      summary: Login — Email + PIN
      description: |
        Login with your registered email and 4-digit PIN. Returns a JWT token valid for 7 days.
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, user_pin]
              properties:
                email:
                  type: string
                  format: email
                  example: john@example.com
                user_pin:
                  type: string
                  pattern: '^[0-9]{4}$'
                  example: "1234"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        "400":
          description: Missing fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                value: { success: false, message: "Email and PIN are required" }
        "401":
          description: Invalid PIN
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: No user found with that email
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          $ref: '#/components/responses/ServerError'

  # ─────────────────────────────────────────────
  # USERS
  # ─────────────────────────────────────────────

  /user:
    get:
      summary: Get all users
      tags: [Users]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of users
        "401":
          $ref: '#/components/responses/Unauthorized'

  /user/{id}:
    get:
      summary: Get user by ID
      tags: [Users]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        "200":
          description: User object
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          $ref: '#/components/responses/NotFound'

    put:
      summary: Update user by ID
      tags: [Users]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                user_name:
                  type: string
                email:
                  type: string
                  format: email
      responses:
        "200":
          description: User updated successfully
        "401":
          $ref: '#/components/responses/Unauthorized'

    delete:
      summary: Delete user by ID
      tags: [Users]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        "200":
          description: User deleted successfully
        "401":
          $ref: '#/components/responses/Unauthorized'

  # ─────────────────────────────────────────────
  # ACCOUNTS
  # ─────────────────────────────────────────────

  /accounts:
    post:
      summary: Create a new fund account
      tags: [Accounts]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [account_type]
              properties:
                account_type:
                  type: string
                  enum: [balanced fund, fixed income fund, money market fund, stock market]
                  example: money market fund
      responses:
        "201":
          description: Account created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Account created successfully
                  account:
                    $ref: '#/components/schemas/Account'
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'

    get:
      summary: Get all accounts for the logged-in user
      tags: [Accounts]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of accounts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Account'
        "401":
          $ref: '#/components/responses/Unauthorized'

  /accounts/{id}:
    get:
      summary: Get account by ID
      tags: [Accounts]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        "200":
          description: Account object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          $ref: '#/components/responses/NotFound'

    delete:
      summary: Delete account by ID
      tags: [Accounts]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        "200":
          description: Account deleted successfully
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          $ref: '#/components/responses/NotFound'

  /accounts/{id}/balance:
    get:
      summary: Get current account balance
      description: |
        Returns the live balance for a specific account.

        **Call this after any deposit or withdrawal to see your updated balance.**
        Balance only changes after Payhero confirms the payment via webhook — not immediately after initiating.
      tags: [Accounts]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        "200":
          description: Current account balance
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  account_id:
                    type: string
                    example: 605c72f2e3b1c72f8c8e4b1a
                  account_type:
                    type: string
                    example: money market fund
                  balance:
                    type: number
                    example: 1500.75
                  currency:
                    type: string
                    example: KES
                  as_of:
                    type: string
                    format: date-time
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          $ref: '#/components/responses/NotFound'

  # ─────────────────────────────────────────────
  # PAYMENTS (Payhero STK Push)
  # ─────────────────────────────────────────────

  /payments/deposit:
    post:
      summary: Initiate M-Pesa deposit (STK Push)
      description: |
        Sends an STK Push to the provided phone number via Payhero.

        **Flow:**
        1. Call this endpoint → STK push sent to phone
        2. User enters M-Pesa PIN on their phone
        3. Payhero calls `/payments/callback` automatically
        4. Balance is updated — check it via `GET /accounts/{id}/balance`

        **Note:** The transaction will show as `pending` until the webhook fires.
        Do not retry if you get a pending response — wait for the webhook.
      tags: [Payments]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone, amount, account_id]
              properties:
                phone:
                  type: string
                  example: "0712345678"
                  description: Phone number to receive STK push (Kenyan format — 07XX or 254XX)
                amount:
                  type: number
                  example: 500
                  description: Amount in KES (minimum 1)
                account_id:
                  type: string
                  example: 605c72f2e3b1c72f8c8e4b1a
                  description: The account ID to credit on success
      responses:
        "200":
          description: STK push sent — awaiting M-Pesa confirmation
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: STK push sent. Please check your phone to complete the payment.
                  transaction_id:
                    type: string
                    example: 64abc123def4567890123456
                    description: Use this to poll status via GET /payments/status/{transaction_id}
                  payhero_reference:
                    type: string
                    example: ws_CO_12345678901234
        "400":
          description: Missing required fields or amount too low
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          description: Account not found or does not belong to you
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Payhero API error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /payments/callback:
    post:
      summary: Payhero payment webhook (callback)
      description: |
        **Do not call this manually.**

        Payhero POSTs the payment result here automatically after the user completes or cancels M-Pesa payment.

        On success:
        - Deposit → account balance is incremented
        - Withdrawal → account balance is decremented

        On failure → transaction is marked `failed`, no balance change.

        The `external_reference` field in the payload is your `transaction_id` (MongoDB `_id`).
      tags: [Payments]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                external_reference:
                  type: string
                  description: Your transaction _id — set when initiating the payment
                  example: 64abc123def4567890123456
                status:
                  type: string
                  description: Payment result from Payhero
                  example: Success
                  enum: [Success, Failed]
                amount:
                  type: number
                  example: 500
                phone_number:
                  type: string
                  example: "254712345678"
      responses:
        "200":
          description: Webhook received and processed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true

  /payments/status/{transaction_id}:
    get:
      summary: Check deposit/withdrawal status
      description: |
        Poll the status of a transaction.

        - If already resolved locally (completed/failed), returns the local record immediately.
        - If still `pending`, queries Payhero directly for the latest status.

        **Tip:** You typically don't need to poll — the webhook updates status automatically.
        Use this only if you need to confirm status manually.
      tags: [Payments]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: transaction_id
          required: true
          schema:
            type: string
          example: 64abc123def4567890123456
          description: The transaction_id returned from POST /payments/deposit
      responses:
        "200":
          description: Transaction status
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  source:
                    type: string
                    enum: [local, payhero]
                    description: Where the status came from
                  status:
                    type: string
                    enum: [pending, completed, failed]
                    example: completed
                  amount:
                    type: number
                    example: 500
                  transaction_type:
                    type: string
                    example: deposit
                  transaction_id:
                    type: string
                    example: 64abc123def4567890123456
                  date:
                    type: string
                    format: date-time
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          $ref: '#/components/responses/NotFound'
        "500":
          description: Failed to fetch status from Payhero
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ─────────────────────────────────────────────
  # TRANSACTIONS
  # ─────────────────────────────────────────────

  /transactions:
    post:
      summary: Create deposit or withdrawal via Payhero (M-Pesa)
      description: |
        Initiates a deposit (STK Push) or withdrawal (M-Pesa payout) via Payhero.

        **Balance is not updated immediately** — it changes only after Payhero confirms
        via the webhook. Check balance with `GET /accounts/{id}/balance`.

        **For deposits:** An STK push is sent to the phone. User completes on their phone.

        **For withdrawals:** A payout is sent to the phone. Balance is only deducted after confirmation.
        Available balance accounts for other pending withdrawals so you can't overdraw.
      tags: [Transactions]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [transaction_type, amount, phoneNumber, account_id]
              properties:
                transaction_type:
                  type: string
                  enum: [deposit, withdraw]
                  example: deposit
                amount:
                  type: number
                  example: 1000
                  description: Amount in KES (must be greater than 0)
                phoneNumber:
                  type: string
                  example: "0712345678"
                  description: M-Pesa phone number (07XX or 254XX format)
                account_id:
                  type: string
                  example: 605c72f2e3b1c72f8c8e4b1a
                  description: The account to credit (deposit) or debit (withdraw)
                description:
                  type: string
                  example: Monthly savings deposit
                  description: Optional note for the transaction
      responses:
        "201":
          description: Transaction initiated — awaiting Payhero confirmation
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: STK Push initiated. Check your phone to complete payment.
                  transaction_status:
                    type: string
                    example: pending
                  transaction_id:
                    type: string
                    example: 64abc123def4567890123456
                  balance:
                    type: number
                    example: 5000
                    description: Current balance (not yet updated — updates after webhook)
                  available_balance:
                    type: number
                    example: 4000
                    description: For withdrawals — balance minus pending withdrawals
        "400":
          description: Missing fields, invalid type, or insufficient funds
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                insufficient_funds:
                  value:
                    message: Insufficient funds
                    status: failed
                    balance: 500
                    available_balance: 500
                missing_phone:
                  value:
                    message: phoneNumber is required
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          description: User or account not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Payhero API error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    get:
      summary: Get all transactions for the logged-in user
      tags: [Transactions]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of transactions sorted by date (newest first)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Transaction'
        "401":
          $ref: '#/components/responses/Unauthorized'

  /transactions/webhook:
    post:
      summary: Payhero webhook — alternate route
      description: |
        **Do not call this manually.**

        Alternative webhook endpoint. Same behaviour as `POST /payments/callback`.
        Payhero POSTs the payment result here after completion.

        Make sure `PAYHERO_CALLBACK_URL` in your environment points to exactly one of:
        - `https://gkash.onrender.com/api/payments/callback`
        - `https://gkash.onrender.com/api/transactions/webhook`
      tags: [Transactions]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                external_reference:
                  type: string
                  description: Your transaction _id
                  example: 64abc123def4567890123456
                status:
                  type: string
                  example: Success
                  enum: [Success, Failed]
      responses:
        "200":
          description: Webhook received
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true

  # ─────────────────────────────────────────────
  # CHATBOT
  # ─────────────────────────────────────────────

  /chatbot/chat:
    post:
      summary: Chat with the money market fund chatbot
      tags: [Chatbot]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message:
                  type: string
                  example: What are money market funds?
                sessionId:
                  type: string
                  example: user-123-session
      responses:
        "200":
          description: Chatbot response

  /chatbot/reset:
    post:
      summary: Reset chatbot conversation
      tags: [Chatbot]
      responses:
        "200":
          description: Conversation reset

  /chatbot/session:
    delete:
      summary: Delete a specific chat session
      tags: [Chatbot]
      responses:
        "200":
          description: Session deleted

  /chatbot/health:
    get:
      summary: Chatbot service health check
      tags: [Chatbot]
      responses:
        "200":
          description: Service is healthy

  /chatbot/financial-advice:
    post:
      summary: Get expert Kenyan financial advice (RAG-enhanced)
      description: |
        AI financial advisor with knowledge of:
        - Money Market Funds (CIC, Zimele, ICEA, Sanlam, etc.)
        - NSE Stock Market
        - Banking products
        - Kenyan investment options
      tags: [Financial Advisory]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message:
                  type: string
                  example: Should I invest in CIC Money Market Fund?
                sessionId:
                  type: string
                  example: user-financial-session
      responses:
        "200":
          description: Expert financial advice response

# ─────────────────────────────────────────────
# COMPONENTS
# ─────────────────────────────────────────────

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token from /auth/register or /auth/login (7-day expiry)

  parameters:
    IdParam:
      in: path
      name: id
      required: true
      schema:
        type: string
      description: MongoDB ObjectId

  responses:
    Unauthorized:
      description: Missing or invalid JWT token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            message: Not authorized
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            message: Not found
    BadRequest:
      description: Invalid request data
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            message: Server error

  schemas:
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: Something went wrong

    AuthResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Login successful
        token:
          type: string
          description: JWT token — include as Bearer token in all authenticated requests
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        user:
          type: object
          properties:
            id:
              type: string
              example: 674d1234567890abcdef
            user_name:
              type: string
              example: John Doe
            email:
              type: string
              example: john@example.com

    Account:
      type: object
      properties:
        _id:
          type: string
          example: 605c72f2e3b1c72f8c8e4b1a
        account_type:
          type: string
          enum: [balanced fund, fixed income fund, money market fund, stock market]
          example: money market fund
        user_id:
          type: string
          example: 674d1234567890abcdef
        account_balance:
          type: number
          example: 1500.00
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Transaction:
      type: object
      properties:
        _id:
          type: string
          example: 64abc123def4567890123456
        user_id:
          type: string
          example: 674d1234567890abcdef
        account_id:
          type: string
          example: 605c72f2e3b1c72f8c8e4b1a
        transaction_type:
          type: string
          enum: [deposit, withdraw]
          example: deposit
        amount:
          type: number
          example: 1000
        status:
          type: string
          enum: [pending, completed, failed]
          example: completed
        payhero_reference:
          type: string
          description: Payhero's CheckoutRequestID — used for manual status checks
          example: ws_CO_12345678901234
        date_and_time:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time